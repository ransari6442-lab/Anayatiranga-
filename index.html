*{

  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle at top, #2a0000, #0b0b0b 70%);
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:12px;
}

/* BADGE */
.badge{

  text-align:center;
  padding:12px;
  font-weight:800;
  border-radius:40px;
  margin:10px 0;
}

/* IMAGE */
.banner img{
  width:100%;
  border-radius:16px;
  border:2px solid rgba(255,0,0,0.4);
  margin:12px 0;
  display:block;
}

/* TITLE */
h1{
  text-align:center;
  font-size:32px;
  margin:10px 0;
  font-weight:900;
}

h1 span{
  color:#ff1a1a;
  display:block;
}

/* TEXT */
.sub{
  text-align:center;
  color:#ddd;
  margin-bottom:15px;
  font-size:14px;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  background:linear-gradient(180deg,#ff1a1a,#b30000);
  padding:16px;
  border-radius:14px;
  color:#fff;
  font-size:18px;
  font-weight:800;
  text-decoration:none;
  margin:12px 0;
}

/* SMALL TEXT */
.small{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

/* PROOF */
.section-title{
  text-align:center;
  font-size:18px;
  font-weight:800;
  margin:15px 0 5px;
}

.proof{
  display:flex;
  gap:10px;
}

.proof img{
  width:50%;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* MOBILE */
@media(max-width:480px){
  .proof{
    flex-direction:column;
  }
  .proof img{
    width:100%;
  }
}
</style>
