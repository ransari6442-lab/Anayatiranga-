<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndianWin</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:radial-gradient(circle at top,#2a0000,#0b0b0b 70%);
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:12px;
}

/* TOP BADGE */
.badge{
  background:linear-gradient(90deg,#ff0000,#ff3b3b);
  text-align:center;
  padding:12px;
  font-weight:800;
  border-radius:50px;
  margin:12px 0;
  font-size:13px;
  letter-spacing:1px;
  box-shadow:0 0 18px rgba(255,0,0,0.45);
}

/* MAIN BANNER */
.banner{
  margin:12px 0;
}

.banner img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid rgba(255,0,0,0.35);
  display:block;
  box-shadow:0 0 25px rgba(255,0,0,0.25);
}

/* TITLE */
h1{
  text-align:center;
  font-size:28px;
  margin-top:20px;
  font-weight:900;
  line-height:1.2;
}

h1 span{
  color:#ff1a1a;
}

/* SUBTEXT */
.sub{
  text-align:center;
  color:#d7d7d7;
  margin:14px 0 20px;
  font-size:15px;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  background:linear-gradient(180deg,#ff1a1a,#c40000);
  padding:18px;
  border-radius:22px;
  color:#fff;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  margin:18px 0;
  transition:0.3s ease;
  box-shadow:0 0 25px rgba(255,0,0,0.45);
}

.btn:hover{
  transform:scale(1.03);
}

/* SMALL TEXT */
.small{
  text-align:center;
  font-size:13px;
  color:#bfbfbf;
  margin-bottom:20px;
}

/* SECTION TITLE */
.section-title{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin:20px 0 8px;
}

.section-sub{
  text-align:center;
  color:#cfcfcf;
  font-size:14px;
  margin-bottom:18px;
}

/* PROOF IMAGES */
.proof{
  display:flex;
  gap:10px;
}

.proof img{
  width:50%;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  border:2px solid rgba(255,0,0,0.35);
  box-shadow:0 0 18px rgba(255,0,0,0.18);
}

/* MOBILE */
@media(max-width:480px){

  h1{
    font-size:24px;
  }

  .btn{
    font-size:18px;
    padding:16px;
  }

  .banner img,
  .proof img{
    height:200px;
  }

}
</style>
</head>

<body>

<div class="container">

</body>
</html>
